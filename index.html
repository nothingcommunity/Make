<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Cloud Upscaler</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #1e1e1e; padding: 30px; border-radius: 12px; text-align: center; border: 1px solid #333; width: 400px; max-width: 90%; }
        input[type="file"] { margin: 20px 0; width: 100%; color: #ccc; }
        select { padding: 12px; width: 100%; margin-bottom: 20px; background: #333; color: white; border: none; border-radius: 6px; font-size: 16px; }
        button { background: #ff4757; color: white; padding: 14px; border: none; width: 100%; cursor: pointer; font-weight: bold; font-size: 16px; border-radius: 8px; transition: 0.3s; }
        button:hover { background: #e84142; }
        #loader { display: none; margin-top: 20px; color: #ff4757; font-weight: bold; }
    </style>
</head>
<body>

    <div class="box">
        <h2>🔥 Real Server Upscaler</h2>
        <p style="color: gray; font-size: 14px;">Cloud Power: Badi photo upload karo, bina browser crash hue upscale hogi.</p>
        
        <form id="uploadForm">
            <input type="file" id="imageInput" accept="image/*" required>
            <select id="scale">
                <option value="2">2x Upscale (Fast)</option>
                <option value="4">4x Upscale (Heavy/Slow)</option>
            </select>
            <button type="submit" id="btn">Upload & Upscale</button>
        </form>
        <div id="loader">
            ⏳ Photo Server par process ho rahi hai...<br>
            <small style="color: gray; font-weight: normal; margin-top: 5px; display: block;">File badi hui toh 10-20 second lag sakte hain, please wait.</small>
        </div>
    </div>

    <script>
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const file = document.getElementById('imageInput').files[0];
            const scale = document.getElementById('scale').value;
            
            if(!file) return alert("Photo select karo bhai!");

            document.getElementById('btn').style.display = 'none';
            document.getElementById('loader').style.display = 'block';

            const formData = new FormData();
            formData.append('image', file);
            formData.append('scale', scale);

            try {
                // Ye request tumhare /upscale backend route pe jayegi
                const response = await fetch('/upscale', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error("Server error ya file bohot zyada badi hai!");
                }

                // Wapas aayi HD image ko download karna
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `Cloud_HD_${scale}x_${file.name}`;
                document.body.appendChild(a);
                a.click();
                a.remove();
            } catch (err) {
                alert("Koi dikkat aayi server pe! " + err.message);
            } finally {
                document.getElementById('btn').style.display = 'block';
                document.getElementById('loader').style.display = 'none';
            }
        });
    </script>
</body>
</html>
